name: verify

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-and-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run i18n:check
      - run: npm run secrets:check
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:56721
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
          DITELE_APP_ORIGIN: http://127.0.0.1:3000
          DITELE_DATA_MODE: supabase

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx supabase start -x studio,imgproxy,logflare,vector
      - run: npx supabase db reset --local
      - run: npx supabase migration list --local
      - run: npm run db:lint
      - run: npx supabase test db

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [static-and-unit, database]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npx supabase start -x studio,imgproxy,logflare,vector
      - run: npx supabase db reset --local
      - name: Export local Supabase environment
        shell: bash
        run: |
          eval "$(npx supabase status -o env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
      - run: npm run test:e2e
        env:
          DITELE_APP_ORIGIN: http://127.0.0.1:3000
          DITELE_DATA_MODE: supabase
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
