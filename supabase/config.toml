project_id = "ditele-v2"

[api]
enabled = true
port = 56721
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 56722
shadow_port = 56720
major_version = 15

[db.pooler]
enabled = false
port = 56729
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.seed]
# Intentionally disabled for generic/linked commands. Deterministic role users
# include known local credentials and are applied only by `npm run db:reset`,
# whose command is explicitly pinned to `--local`.
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 56723
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 56724
smtp_port = 56725
pop3_port = 56726

[storage]
enabled = true
file_size_limit = "25MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3100"
additional_redirect_urls = ["http://localhost:3000/**", "http://127.0.0.1:3000/**", "http://localhost:3100/**", "http://127.0.0.1:3100/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 12
password_requirements = "lower_upper_letters_digits_symbols"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true
max_frequency = "1m"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false

[analytics]
enabled = false

[edge_runtime]
enabled = false
